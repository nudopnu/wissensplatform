name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (content + parser)
        uses: actions/checkout@v4
        with:
          path: content

      - name: Checkout dev (Angular app)
        uses: actions/checkout@v4
        with:
          ref: dev
          path: app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Parse markdown → steps.json
        run: python content/parser.py content/content > app/public/content/steps.json

      - name: Copy info assets
        run: |
          rm -rf app/public/content/info
          cp -r content/info app/public/content/info

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npx ng build --base-href /${{ github.event.repository.name }}/

      - name: Fix SPA routing
        run: cp app/dist/wissensplatform/browser/index.html app/dist/wissensplatform/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/wissensplatform/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
